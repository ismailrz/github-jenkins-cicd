# Jenkins Configuration as Code (JCasC)
# This file configures Jenkins declaratively — no click-ops required.

jenkins:
  systemMessage: "Jenkins CI/CD Practice — configured via JCasC"
  numExecutors: 2
  scmCheckoutRetryCount: 2
  mode: NORMAL

  # Global credentials stored here; real secrets should come from env vars
  # or a secrets manager (Vault, AWS SSM, etc.)
  # See the 'credentials' section below.

  globalNodeProperties:
    - envVars:
        env:
          - key: "ORG_NAME"
            value: "my-org"

security:
  scriptApproval:
    # Pre-approve the scripts your shared library uses so builds don't hang
    # waiting for admin approval in a fresh environment.
    approvedSignatures:
      - "method groovy.lang.GroovyObject invokeMethod java.lang.String java.lang.Object"

credentials:
  system:
    domainCredentials:
      - credentials:
          # Placeholder username/password — replace with real values or
          # inject via environment variables using ${VAR_NAME} syntax.
          - usernamePassword:
              scope: GLOBAL
              id: "docker-hub-creds"
              description: "Docker Hub credentials"
              username: "${DOCKERHUB_USER:-changeme}"
              password: "${DOCKERHUB_PASS:-changeme}"
          - string:
              scope: GLOBAL
              id: "sonar-token"
              description: "SonarQube analysis token (demo placeholder)"
              secret: "${SONAR_TOKEN:-demo-token}"

unclassified:
  location:
    url: "http://localhost:8080/"
    adminAddress: "admin@example.com"
  globalLibraries:
    libraries:
      - name: "pipeline-library"
        defaultVersion: "main"
        implicit: true
        allowVersionOverride: true
        retriever:
          modernSCM:
            scm:
              git:
                remote: "file:///shared-library"
                credentialsId: ""
  timestamper:
    allPipelines: true
  ansiColorBuildWrapper:
    globalColorMapName: "xterm"
