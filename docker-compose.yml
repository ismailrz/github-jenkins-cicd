services:

  jenkins:
    build:
      context: ./jenkins
      dockerfile: Dockerfile
    container_name: jenkins
    restart: unless-stopped
    ports:
      - "8080:8080"   # Web UI
      - "50000:50000" # Inbound agent port
    volumes:
      - jenkins_home:/var/jenkins_home
      # Mount host Docker socket so Jenkins can build/run containers
      - /var/run/docker.sock:/var/run/docker.sock
      # Mount this repo as the shared library source (see JCasC globalLibraries)
      - ./:/shared-library
    environment:
      JENKINS_ADMIN_PASSWORD: ${JENKINS_ADMIN_PASSWORD:-admin}
      DOCKERHUB_USER: ${DOCKERHUB_USER:-}
      DOCKERHUB_PASS: ${DOCKERHUB_PASS:-}
      SONAR_TOKEN: ${SONAR_TOKEN:-}
    networks:
      - cicd

  # Lightweight Python agent connected via JNLP.
  # Demonstrates the "agent { label 'python' }" pattern in Jenkinsfile.
  agent-python:
    image: python:3.12-slim
    container_name: jenkins-agent-python
    restart: unless-stopped
    depends_on:
      - jenkins
    environment:
      JENKINS_URL: http://jenkins:8080
      JENKINS_AGENT_NAME: python-agent
      JENKINS_SECRET: ${AGENT_SECRET:-}   # Set after first boot (see README)
      JENKINS_WEB_SOCKET: "true"
    # The agent stays idle until Jenkins assigns work.
    # Replace the sleep with the real JNLP jar invocation once you have the
    # secret from Jenkins UI → Manage Nodes → python-agent → secret.
    command: >
      sh -c "
        pip install --quiet jenkins-jnlp-agent 2>/dev/null || true &&
        echo 'Agent container running — see README to connect it to Jenkins' &&
        sleep infinity
      "
    networks:
      - cicd

  # The sample app (deployed by the pipeline in the 'deploy' stage)
  app:
    build:
      context: ./app
      dockerfile: Dockerfile
    container_name: flask-app
    restart: unless-stopped
    ports:
      - "5000:5000"
    networks:
      - cicd
    profiles:
      - deploy   # only started by: docker compose --profile deploy up

volumes:
  jenkins_home:

networks:
  cicd:
    driver: bridge
